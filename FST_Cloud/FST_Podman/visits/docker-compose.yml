services:
    redis-server:
      image: docker.io/redis
      volumes:
        - ./redis:/data
      command: ["redis-server", "--save", "1 1", "--protected-mode", "no"]
    node-app:
      restart: always
      build:
          context: .
          dockerfile: Dockerfile
      image: docker.io/dilsharv/visits
      ports:
          - "8081:8081"

